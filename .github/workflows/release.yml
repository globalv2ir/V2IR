name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Xray binaries
        # Downloads arm64-v8a and x86_64 binaries + geo assets.
        # Requires internet access — runs without proxy on GitHub Actions.
        run: |
          mkdir -p app/src/main/assets/xray/arm64-v8a
          mkdir -p app/src/main/assets/xray/x86_64
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/x86_64

          # Download geoip.dat
          curl -L https://github.com/loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat \
               -o app/src/main/assets/geoip.dat
          # Download geosite.dat
          curl -L https://github.com/loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat \
               -o app/src/main/assets/geosite.dat

          # Download Xray arm64-v8a
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip \
               -o /tmp/xray-arm64.zip
          unzip -p /tmp/xray-arm64.zip xray > app/src/main/assets/xray/arm64-v8a/xray
          cp app/src/main/assets/xray/arm64-v8a/xray app/src/main/jniLibs/arm64-v8a/libxray.so
          chmod +x app/src/main/assets/xray/arm64-v8a/xray

          # Download Xray x86_64
          curl -L https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-amd64.zip \
               -o /tmp/xray-x86_64.zip
          unzip -p /tmp/xray-x86_64.zip xray > app/src/main/assets/xray/x86_64/xray
          cp app/src/main/assets/xray/x86_64/xray app/src/main/jniLibs/x86_64/libxray.so
          chmod +x app/src/main/assets/xray/x86_64/xray

      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: V2IR ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            app/build/outputs/apk/release/app-release-unsigned.apk
